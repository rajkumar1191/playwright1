<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Element Interaction</title>
    <style>
      .drop-zone {
        width: 200px;
        height: 100px;
        border: 2px dashed #999;
        background: #f0f0f0;
        margin: 10px 0;
        padding: 10px;
      }

      .drag-item {
        width: 80px;
        padding: 5px;
        background: #0076ff;
        color: #fff;
        cursor: grab;
        text-align: center;
      }

      .hidden-menu {
        display: none;
        background: #e0e0e0;
        padding: 10px;
      }

      .hover-container:hover .hidden-menu {
        display: block;
      }
    </style>
  </head>

  <body>
    <h1>Element Interaction</h1>
    <form id="element-form">
      <div>
        <label for="username">Account Name:</label>
        <input type="text" id="username" placeholder="Choose a unique name" />
      </div>

      <div>
        <p>Select your tier:</p>
        <input type="radio" id="tier-free" name="tier" value="free" /><label
          for="tier-free"
          >Free Tier</label
        >
        <input type="radio" id="tier-pro" name="tier" value="pro" /><label
          for="tier-free"
          >Pro Plan</label
        >
      </div>

      <div>
        <input type="checkbox" id="newletter-check" />
        <label for="newletter-check">Subscribe to newsletter update</label>
      </div>

      <div>
        <label for="country-dropdown">Country of Residence:</label>
        <select id="country-dropdown">
          <option value="">--Select--</option>
          <option value="IN">India</option>
          <option value="US">United States</option>
          <option value="UK">United Kingdom</option>
        </select>
      </div>

      <div class="hover-container" style="margin-top: 20px">
        <button id="menu-hover-btn">Hover over me for options</button>
        <div class="hidden-menu">
          <a href="#edit" id="content-edit">Quick Edit</a>
        </div>
      </div>

      <div style="margin-top: 20px">
        <div id="source-box" class="drag-item" draggable="true">Drag me</div>
        <div id="target-box" class="drop-zone">Drop Zone Target</div>
      </div>
    </form>

    <script>
      const target = document.getElementById("target-box");
      target.addEventListener("dragover", (e) => e.preventDefault());
      target.addEventListener("drop", (e) => {
        e.preventDefault();
        target.innerText = "Item dropped Successfully";
        target.style.background = "#d4edda";
      });
    </script>
  </body>
</html>
