<!doctype html>
<html>
  <head>
    <title>Advanced Browser Interactions</title>
  </head>
  <body>
    <h1>Advanced Browser Interactions</h1>

    <!-- Multi Tab -->
    <section style="margin: 20px 0; border: 1px solid #ccc; padding: 10px">
      <h3>Multi-Tab Operations</h3>
      <button id="new-tab-btn">Launch External Status Dashboard</button>
    </section>

    <!-- Native Dialog Triggers -->
    <section style="margin: 20px 0; border: 1px solid #ccc; padding: 10px">
      <h3>Javascript Modals</h3>
      <button id="alert-btn" onclick="alert('System notification tiggered!')">
        Trigger Alert
      </button>
      <button id="prompt-btn" onclick="triggerPrompt()">
        Launch Profile Prompt
      </button>
      <p id="prompt-result">No input recorded yet.</p>
    </section>

    <!-- IFrame -->
    <section style="margin: 20px 0; border: 1px solid #ccc; padding: 10px">
      <h3>Secure iFrame Document</h3>

      <iframe
        id="payment-frame"
        srcdoc="
            <html>
                <body>
                    <h4>Secure Payment Gateway Portal</h4>
                    <input type='text' id='card-number' placeholder='4343 3434 3434 3434'>
                    <button id='pay-btn' onclick='this.innerText=&quot;Processing...&quot;'>Authorize Secure Payment</button>

                </body>
            </html>
            "
        style="width: 100%; height: 120px"
      ></iframe>
    </section>

    <!-- Shadow Dom -->
    <section style="margin: 20px 0; border: 1px solid #ccc; padding: 10px">
      <h3>Shadow Dom Elements</h3>
      <div id="shadow-host"></div>
    </section>

    <script>
      document.getElementById("new-tab-btn").addEventListener("click", () => {
        const newWindow = window.open("", "_blank");
        newWindow.document.write(`<html>
            <head><title>External Dashboard</title></head>
            <body>
                <h2>Secure Analytics Engine</h2>
                <p id='live-data'>System Status: Operational</p>
            </body>
            </html>
            `);
      });


      function triggerPrompt(){
        const name = prompt('Please enter your administrator security code:');
        if(name){
            document.getElementById('prompt-result').innerText = `Authorized Code: ${name}`;
        }
      }

      const host = document.getElementById('shadow-host');
      const shadowRoot = host.attachShadow({mode:'open'});
      shadowRoot.innerHTML= `
      <style>p{color:#ff0055; font-weight:bold}</style>
      <p id="shadow-text">Hidden text inside custom Shadow Root component</p>
      <input type="text" id='shadow-input' placeholder="Type inside shadow Dom" />
      `;

    </script>
  </body>
</html>
