<!DOCTYPE html>
<html>
    <head>
        <title>
            Network/API testing
        </title>
        <style>
            body{
                padding: 1.1rem;
            }
            .user-card{
                border: 0.5px solid #ccc;
                padding: 0.7rem;
                margin: 0.7rem;
                border-radius: 6px;
                background-color: #fafafa;
            }
            #error-msg{
                color: red;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <h1>Network/API Mocking</h1>
        <button id="load-user-btn">Load Users from server</button>
        <div id="user-container"></div>
        <p id="error-msg"></p>

        <script>
            document.getElementById("load-user-btn").addEventListener('click', async()=>{
                const container = document.getElementById('user-container');
                const errorMsg = document.getElementById('error-msg');
                container.innerHTML='';
                errorMsg.innerText='';

                try{
                    const response = await fetch("https://jsonplaceholder.typicode.com/users");

                    if(!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                    const users = await response.json();

                    users.slice(0,3).forEach(user => {
                        const card = document.createElement('div');
                        card.className='user-card';
                        card.innerHTML = `<strong>${user.name}</strong> - <span>${user.email}</span>`;
                        container.appendChild(card)
                    });
                } catch (err){
                    errorMsg.innerText = `System Failure: ${err.message}`;
                }
            })
        </script>
    </body>
</html>
